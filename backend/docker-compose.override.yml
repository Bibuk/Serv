version: '3.9'

# Development overrides — hot reload for backend and frontends
services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    environment:
      DEBUG: "true"

  frontend-internal:
    build:
      context: ./frontend/app
      dockerfile: Dockerfile.dev
    ports: !override 
      - "3000:3000"
    volumes:
      - ./frontend/app:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      VITE_PORTAL: internal
      VITE_API_MOCK: "false"
      VITE_API_URL: "http://backend:8000"

  frontend-client:
    build:
      context: ./frontend/app
      dockerfile: Dockerfile.dev
    ports: !override 
      - "3001:3001"
    volumes:
      - ./frontend/app:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3001
    environment:
      VITE_PORTAL: client
      VITE_API_MOCK: "false"
      VITE_API_URL: "http://backend:8000"
